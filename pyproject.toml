[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
bio-analyze-core = { workspace = true }
bio-analyze-cli = { workspace = true }
bio-analyze-rna-seq = { workspace = true }
bio-analyze-docking = { workspace = true }
bio-analyze-plot = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["packages"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["packages"]
addopts = "-q"
