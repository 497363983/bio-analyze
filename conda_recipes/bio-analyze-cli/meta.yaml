{% set name = "bio-analyze-cli" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../../packages/cli

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - bioanalyze = bio_analyze_cli.main:main

requirements:
  host:
    - python >=3.10,<3.15
    - hatchling
    - pip
  run:
    - python >=3.10,<3.15
    - bio-analyze-core >=0.1.0
    - agentyper >=0.1.12

test:
  imports:
    - bio_analyze_cli
  commands:
    - bioanalyze --help
