{% set name = "bio-analyze-core" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../../packages/core

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10,<3.15
    - hatchling
    - pip
  run:
    - python >=3.10,<3.15
    - rich >=14.3.3
    - loguru >=0.7.2
    - pyyaml >=6.0
    - agentyper >=0.1.12
    - polib >=1.2.0
    - tomli >=2.0.1  # [py<311]

test:
  imports:
    - bio_analyze_core
