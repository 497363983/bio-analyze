{% set name = "bio-analyze-omics" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../../packages/omics

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10,<3.15
    - hatchling
    - pip
  run:
    - python >=3.10,<3.15
    - bio-analyze-core >=0.1.0
    - bio-analyze-plot >=0.1.0
    - pandas >=2.0.0
    - numpy >=1.20.0
    - scipy >=1.10.0
    - pydeseq2 >=0.4.0
    - gseapy >=1.0.0
    - genomepy >=0.16.0
    - jinja2 >=3.1.0
    - scikit-learn >=1.3.0
    - agentyper >=0.1.12

test:
  imports:
    - bio_analyze_omics
