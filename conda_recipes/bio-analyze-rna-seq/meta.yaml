{% set name = "bio-analyze-rna-seq" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../../packages/rna_seq

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.9
    - hatchling
    - pip
  run:
    - python >=3.9
    - bio-analyze-core >=0.1.0
    - bio-analyze-plot >=0.1.0
    - pandas >=2.0.0
    - numpy >=1.20.0
    - scipy >=1.10.0
    - pydeseq2 >=0.4.0
    - gseapy >=1.0.0
    - genomepy >=0.16.0
    - jinja2 >=3.1.0
    - scikit-learn >=1.3.0
    - typer >=0.9.0

test:
  imports:
    - bio_analyze_rna_seq
