[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bio-analyze-docking"
version = "0.1.0"
description = "Molecular docking module for bio-analyze."
readme = "README.md"
requires-python = ">=3.9, <3.13"
license = { text = "GPL-3.0" }
authors = [{ name = "qww" }]
dependencies = [
    "bio-analyze-core>=0.1.0",
    "numpy>=1.20.0",
    "meeko>=0.5.1",
    # "vina>=1.2.0; sys_platform != 'win32'", # Provided by Conda
    "rdkit>=2024.03.1", # Provided by Conda
    "scipy>=1.10.0",
    "propka>=3.5.0",
    "gemmi>=0.6.0",
    "pdbfixer>=1.9.0",
    "pandas>=2.0.0",
    "openpyxl>=3.1.0",
    # "pymol-open-source>=2.5.0", # Provided by Conda
    # "openbabel>=3.1.0; sys_platform != 'win32'", # Provided by Conda
]

[project.optional-dependencies]
dev = ["pytest"]

[project.entry-points."bio_analyze.cli"]
docking = "bio_analyze_docking.cli:get_app"

[tool.hatch.build.targets.wheel]
packages = ["src/bio_analyze_docking"]
