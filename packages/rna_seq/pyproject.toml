[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bio-analyze-rna-seq"
version = "0.1.0"
description = "Transcriptomics analysis module for bio-analyze."
readme = "README.md"
requires-python = ">=3.9, <3.15"
license = { text = "GPL-3.0" }
authors = [{ name = "qww" }]
dependencies = [
    "bio-analyze-core>=0.1.0",
    "bio-analyze-plot>=0.1.0",
    "pandas>=2.0.0",
    "numpy>=1.20.0",
    "scipy>=1.10.0",
    "pydeseq2>=0.4.0",
    "gseapy>=1.0.0",
    "genomepy>=0.16.0",
    "jinja2>=3.1.0",
    "scikit-learn>=1.3.0",
    "typer>=0.9.0"
]

[project.entry-points."bio_analyze.cli"]
rna_seq = "bio_analyze_rna_seq.cli:get_app"

[tool.hatch.build.targets.wheel]
packages = ["src/bio_analyze_rna_seq"]
