[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bio-analyze-cli"
version = "0.1.0"
description = "Unified CLI for the bio-analyze toolbox (plugin-based)."
readme = "README.md"
requires-python = ">=3.9, <3.15"
license = { text = "GPL-3.0" }
authors = [{ name = "qww" }]
dependencies = [
  "bio-analyze-core>=0.1.0",
  "typer>=0.12.0",
]

[project.scripts]
bioanalyze = "bio_analyze_cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/bio_analyze_cli"]
