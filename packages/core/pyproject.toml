[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bio-analyze-core"
version = "0.1.0a0"
description = "Shared core utilities for the bio-analyze toolbox."
readme = "README.md"
requires-python = ">=3.9, <3.15"
license = { text = "GPL-3.0" }
authors = [{ name = "qww" }]
dependencies = [
    "rich>=14.3.3",
    "loguru>=0.7.2",
    "PyYAML>=6.0",
    "typer>=0.9.0",
    "tomli>=2.0.1; python_version < '3.11'",
]

[tool.hatch.build.targets.wheel]
packages = ["src/bio_analyze_core"]
