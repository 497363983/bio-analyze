[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bio-analyze-core"
version = "0.1.0a4"
description = "Shared core utilities for the bio-analyze toolbox."
readme = "README.md"
requires-python = ">=3.10, <3.15"
license = { text = "GPL-3.0" }
authors = [{ name = "qww" }]
dependencies = [
    "rich>=14.3.3",
    "loguru>=0.7.2",
    "PyYAML>=6.0",
    "agentyper>=0.1.12",
    "polib>=1.2.0",
    "tomli>=2.0.1; python_version < '3.11'",
    "tenacity"
]

[tool.hatch.build.targets.wheel]
packages = ["src/bio_analyze_core"]
