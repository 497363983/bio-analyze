[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bio-analyze-plot"
version = "0.1.0"
description = "Publication-ready plotting module for bio-analyze."
readme = "README.md"
requires-python = ">=3.9, <=3.14"
license = { text = "GPL-3.0" }
authors = [{ name = "qww" }]
dependencies = [
    "bio-analyze-core>=0.1.0",
    "matplotlib>=3.8.0",
    "seaborn>=0.13.0",
    "pandas>=2.0.0",
    "numpy>=1.20.0",
    "scipy>=1.10.0",
    "openpyxl>=3.1.0",
    "scikit-learn>=1.3.0",
    "statannotations>=0.6.0",
    "typer>=0.9.0",
    # "biopython>=1.80", # Reserved for MSA
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-regressions",
    "allure-pytest",
    "pillow"
]

[project.entry-points."bio_analyze.cli"]
plot = "bio_analyze_plot.cli:get_app"

[tool.hatch.build.targets.wheel]
packages = ["src/bio_analyze_plot"]
