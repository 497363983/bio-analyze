name: Test Coverage

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    coverage:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                package: [core, plot, docking, rna_seq, cli]
        
        steps:
            - uses: actions/checkout@v6

            - name: Set up Micromamba
              uses: mamba-org/setup-micromamba@v2
              with:
                  environment-name: bio-analyze-env
                  create-args: >-
                      python=3.10
                  condarc: |
                      channels:
                        - conda-forge
                        - bioconda
                        - defaults
                      channel_priority: strict
                  init-shell: bash
                  cache-environment: true
                  post-cleanup: "all"

            - name: Install System Dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgl1 libglib2.0-0 fonts-wqy-microhei fonts-wqy-zenhei fonts-dejavu-core fonts-dejavu-extra ttf-mscorefonts-installer curl git build-essential

            - name: Install Conda Dependencies
              run: |
                  micromamba install -y -n bio-analyze-env \
                    fastp \
                    salmon \
                    fastqc \
                    star \
                    samtools \
                    gffread \
                    sra-tools \
                    pdbfixer \
                    vina \
                    meeko \
                    propka \
                    rdkit \
                    six \
                    pymol-open-source \
                    gemmi \
                    hatchling

                  micromamba clean -afy

            - name: Install External Binaries (Gnina/Smina)
              run: |
                  sudo curl -L https://github.com/gnina/gnina/releases/download/v1.0.3/gnina -o /usr/local/bin/gnina
                  sudo chmod +x /usr/local/bin/gnina
                  sudo curl -L https://sourceforge.net/projects/smina/files/smina.static/download -o /usr/local/bin/smina
                  sudo chmod +x /usr/local/bin/smina

            - name: Install Project Packages Locally
              shell: bash -el {0}
              run: |
                  python -m pip install --upgrade pip
                  pip install -e packages/core
                  pip install -e packages/plot
                  pip install -e packages/docking
                  pip install -e packages/rna_seq
                  pip install -e packages/cli
                  pip install pytest \
                    pytest-cov \
                    pytest-sugar \
                    pytest-clarity \
                    pytest-timeout \
                    pytest-regressions \
                    pillow \
                    allure-pytest

            - name: Run Tests with Coverage
              shell: bash -el {0}
              run: |
                  pytest packages/${{ matrix.package }} --timeout=60 --cov=packages/${{ matrix.package }} --cov-report=xml:coverage_${{ matrix.package }}.xml

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage_${{ matrix.package }}.xml
                  flags: ${{ matrix.package }}
                  name: ${{ matrix.package }}
                  fail_ci_if_error: false
