name: CI

permissions:
    contents: write
    checks: write
    pull-requests: write
    pages: write
    id-token: write

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    test:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, macos-13, windows-latest]
                python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
            fail-fast: false

        steps:
            - uses: actions/checkout@v4

            - name: Determine OS Specifics
              shell: bash
              run: |
                  COMMON="pdbfixer vina meeko propka rdkit six pymol-open-source gemmi hatchling"
                  LINUX_MAC="fastp salmon fastqc star samtools gffread sra-tools"
                  
                  if [ "$RUNNER_OS" == "Linux" ]; then
                      echo "BIO_PKGS=$COMMON $LINUX_MAC" >> $GITHUB_ENV
                  elif [ "$RUNNER_OS" == "macOS" ]; then
                      echo "BIO_PKGS=$COMMON $LINUX_MAC" >> $GITHUB_ENV
                  elif [ "$RUNNER_OS" == "Windows" ]; then
                      echo "BIO_PKGS=$COMMON" >> $GITHUB_ENV
                  fi

            - name: Set up Micromamba
              uses: mamba-org/setup-micromamba@v2
              with:
                  environment-name: bio-analyze-env
                  create-args: >-
                      python=${{ matrix.python-version }}
                      ${{ env.BIO_PKGS }}
                  condarc: |
                      channels:
                        - conda-forge
                        - bioconda
                        - defaults
                      channel_priority: strict
                  init-shell: bash
                  cache-environment: true
                  post-cleanup: "all"

            - name: Install System Dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgl1 libglib2.0-0 fonts-wqy-microhei fonts-wqy-zenhei fonts-dejavu-core fonts-dejavu-extra ttf-mscorefonts-installer curl git build-essential

            - name: Install Conda Dependencies
              run: |
                  # Dependencies are now installed via create-args in setup-micromamba step
                  micromamba list

            - name: Install External Binaries (Gnina/Smina)
              shell: bash
              run: |
                  if [ "$RUNNER_OS" == "Linux" ]; then
                      sudo curl -L https://github.com/gnina/gnina/releases/download/v1.0.3/gnina -o /usr/local/bin/gnina
                      sudo chmod +x /usr/local/bin/gnina
                      sudo curl -L https://sourceforge.net/projects/smina/files/smina.static/download -o /usr/local/bin/smina
                      sudo chmod +x /usr/local/bin/smina
                  elif [ "$RUNNER_OS" == "macOS" ]; then
                      sudo curl -L https://sourceforge.net/projects/smina/files/smina.osx/download -o /usr/local/bin/smina
                      sudo chmod +x /usr/local/bin/smina
                  fi


            - name: Install Project Packages Locally
              shell: bash -el {0}
              run: |
                  # Install packages in editable mode using pip
                  python -m pip install --upgrade pip
                  pip install -e packages/core
                  pip install -e packages/plot
                  pip install -e packages/docking
                  pip install -e packages/rna_seq
                  pip install -e packages/cli
                  pip install pytest \
                    pytest-cov \
                    pytest-sugar \
                    pytest-clarity \
                    pytest-timeout \
                    pytest-regressions \
                    allure-pytest \
                    pillow

            - name: Run Tests
              shell: bash -el {0}
              run: |
                  pytest packages --timeout=60 --junit-xml pytest.xml --alluredir=allure-results-${{ matrix.python-version }} --clean-alluredir

            - name: Upload Test Results
              if: (!cancelled())
              uses: actions/upload-artifact@v4
              with:
                  name: Test Results (${{ matrix.os }} - ${{ matrix.python-version }})
                  path: pytest.xml

            - name: Upload Allure Results
              if: (!cancelled())
              uses: actions/upload-artifact@v4
              with:
                  name: allure-results-${{ matrix.os }}-${{ matrix.python-version }}
                  path: allure-results-${{ matrix.python-version }}
                  retention-days: 7

    publish-test-results:
        name: "Publish Tests Results"
        needs: test
        runs-on: ubuntu-latest

        if: (!cancelled())

        steps:
            - name: Checkout gh-pages (for history)
              uses: actions/checkout@v4
              continue-on-error: true
              with:
                ref: gh-pages
                path: gh-pages
                
            - name: Download Test Results
              uses: actions/download-artifact@v4
              with:
                  pattern: Test Results*
                  path: artifacts
                  merge-multiple: true

            - name: Publish Test Results
              uses: EnricoMi/publish-unit-test-result-action@v2
              with:
                  files: "artifacts/**/*.xml"

            - name: Download Allure Results
              uses: actions/download-artifact@v4
              with:
                  pattern: allure-results-*
                  path: allure-results
                  merge-multiple: true
            
            - name: Copy History Trend
              run: |
                if [ -d "gh-pages/history" ]; then
                  mkdir -p allure-results/history
                  cp -r gh-pages/history/* allure-results/history/
                fi

            - name: Upload Merged Results
              uses: actions/upload-artifact@v4
              with:
                  name: allure-results-merged
                  path: allure-results
    deploy-report:
        name: "Deploy Allure Report"
        needs: publish-test-results
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deploy.outputs.page_url }}

        if: (!cancelled())

        steps:

            - name: Download Merged Results
              uses: actions/download-artifact@v4
              with:
                  name: allure-results-merged
                  path: allure-results

            - name: Generate Allure Report

              uses: simple-elf/allure-report-action@master
              with:
                  allure-results: allure-results
                  allure-report: allure-report
            - name: Deploy to GitHub Pages
              id: deployment
              uses: peaceiris/actions-gh-pages@v4
              with:
                github_token: ${{ secrets.GITHUB_TOKEN }}
                publish_dir: allure-report
