name: Publish to PyPI

on:
    push:
        branches: [main]
        tags:
            - 'packages/*/v*'
    workflow_run:
        workflows: ["CI"]
        types:
            - completed

permissions:
    contents: write
    id-token: write

jobs:
    release:
        name: Build and Publish
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
        if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.event.workflow_run.head_sha }}
                  fetch-tags: true

            - name: Parse Tag
              id: parse_tag
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git fetch --force --tags
                  HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
                  PREV_MAIN_SHA="$(git rev-parse "${HEAD_SHA}^1" 2>/dev/null || true)"

                  if [ -n "$PREV_MAIN_SHA" ]; then
                    mapfile -t CANDIDATE_TAGS < <(git tag --merged "$HEAD_SHA" --no-merged "$PREV_MAIN_SHA" --list 'packages/*/v*')
                  else
                    mapfile -t CANDIDATE_TAGS < <(git tag --merged "$HEAD_SHA" --list 'packages/*/v*')
                  fi

                  if [ "${#CANDIDATE_TAGS[@]}" -eq 0 ]; then
                    echo "No candidate tags introduced by this main commit."
                    echo "SHOULD_RELEASE=false" >> $GITHUB_ENV
                    exit 0
                  fi

                  echo "Candidate tags introduced by this commit:"
                  printf '%s\n' "${CANDIDATE_TAGS[@]}"

                  SELECTED_TAGS=()
                  for TAG in "${CANDIDATE_TAGS[@]}"; do
                    TAG_COMMIT="$(git rev-list -n 1 "$TAG")"
                    if ! git merge-base --is-ancestor "$TAG_COMMIT" "$HEAD_SHA"; then
                      continue
                    fi
                    if gh release view "$TAG" >/dev/null 2>&1; then
                      continue
                    fi
                    SELECTED_TAGS+=("$TAG")
                  done

                  if [ "${#SELECTED_TAGS[@]}" -eq 0 ]; then
                    echo "No unreleased tag merged into main for SHA: $HEAD_SHA"
                    echo "SHOULD_RELEASE=false" >> $GITHUB_ENV
                    exit 0
                  fi

                  if [ "${#SELECTED_TAGS[@]}" -gt 1 ]; then
                    echo "Multiple unreleased tags detected in this merge; selecting latest by version sort."
                    printf '%s\n' "${SELECTED_TAGS[@]}"
                  fi

                  TAG_NAME="$(printf '%s\n' "${SELECTED_TAGS[@]}" | sort -V | tail -n 1)"
                  IFS='/' read -r _ PKG_NAME TAG_VERSION <<< "$TAG_NAME"
                  VERSION=${TAG_VERSION#v}

                  # Check if this is a prerelease (contains -, a, b, rc, etc.)
                  if [[ "$VERSION" =~ [a-zA-Z-] ]]; then
                    PRERELEASE="true"
                  else
                    PRERELEASE="false"
                  fi

                  echo "SHOULD_RELEASE=true" >> $GITHUB_ENV
                  echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV
                  echo "PACKAGE_NAME=${PKG_NAME}" >> $GITHUB_ENV
                  echo "VERSION=${VERSION}" >> $GITHUB_ENV
                  echo "PRERELEASE=${PRERELEASE}" >> $GITHUB_ENV
                  echo "Parsed Package: $PKG_NAME, Version: $VERSION, Prerelease: $PRERELEASE"

            - name: Set up uv
              if: ${{ env.SHOULD_RELEASE == 'true' }}
              uses: astral-sh/setup-uv@v7

            - name: Bump Version
              if: ${{ env.SHOULD_RELEASE == 'true' }}
              run: |
                  cd packages/${{ env.PACKAGE_NAME }}
                  uv version ${{ env.VERSION }}

            - name: Build Package
              if: ${{ env.SHOULD_RELEASE == 'true' }}
              run: |
                  cd packages/${{ env.PACKAGE_NAME }}
                  uv build --out-dir dist

            - name: Publish to PyPI
              if: ${{ env.SHOULD_RELEASE == 'true' }}
              run: |
                  cd packages/${{ env.PACKAGE_NAME }}
                  uv publish dist/* --trusted-publishing always

            - name: Commit and Push Version Bump
              if: ${{ env.SHOULD_RELEASE == 'true' }}
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git restore packages/${{ env.PACKAGE_NAME }}/pyproject.toml

                  git fetch origin main
                  git checkout main

                  cd packages/${{ env.PACKAGE_NAME }}
                  uv version ${{ env.VERSION }}

                  cd ../../

                  # Generate changelog for this specific package using git-cliff
                  # Use --include-path to only include commits that touched this package's directory
                  touch packages/${{ env.PACKAGE_NAME }}/CHANGELOG.md

                  if [ "${{ env.PRERELEASE }}" = "false" ]; then
                    # For formal releases, combine all commits since the last formal release
                    # This generates a single changelog entry containing all commits from alpha/beta/rc versions
                    # NOTE: Do not pass --repository URL here; git-cliff should use local git context in Actions.
                    uvx git-cliff@latest --config cliff.toml --include-path "packages/${{ env.PACKAGE_NAME }}/**" --tag "v${{ env.VERSION }}" --prepend packages/${{ env.PACKAGE_NAME }}/CHANGELOG.md --unreleased --ignore-tags ".*-(alpha|beta|rc).*"

                    # Generate release notes for GitHub Release ignoring prerelease tags
                    uvx git-cliff@latest --config cliff.toml --include-path "packages/${{ env.PACKAGE_NAME }}/**" --tag "v${{ env.VERSION }}" --unreleased --strip all --ignore-tags ".*-(alpha|beta|rc).*" > release_notes.md
                  else
                    # For prereleases, generate normal incremental changelog
                    uvx git-cliff@latest --config cliff.toml --include-path "packages/${{ env.PACKAGE_NAME }}/**" --tag "v${{ env.VERSION }}" --prepend packages/${{ env.PACKAGE_NAME }}/CHANGELOG.md --unreleased

                    # Generate release notes for GitHub Release
                    uvx git-cliff@latest --config cliff.toml --include-path "packages/${{ env.PACKAGE_NAME }}/**" --tag "v${{ env.VERSION }}" --unreleased --strip all > release_notes.md
                  fi

                  git add packages/${{ env.PACKAGE_NAME }}/pyproject.toml packages/${{ env.PACKAGE_NAME }}/CHANGELOG.md
                  if ! git diff --staged --quiet; then
                    git commit -m "chore(release): bump ${{ env.PACKAGE_NAME }} version to ${{ env.VERSION }} and update changelog"
                    git push origin main
                  else
                    echo "No changes to commit."
                  fi

            - name: Create GitHub Release
              if: ${{ env.SHOULD_RELEASE == 'true' }}
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.TAG_NAME }}
                  body_path: release_notes.md
                  name: ${{ env.PACKAGE_NAME }} v${{ env.VERSION }}
                  prerelease: ${{ env.PRERELEASE == 'true' }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
