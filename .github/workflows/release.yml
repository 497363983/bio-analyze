name: Publish to PyPI

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'packages/') && contains(github.event.workflow_run.head_branch, '/v') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Parse Tag
        id: parse_tag
        run: |
          # In a workflow_run event triggered by a tag, head_branch contains the tag name
          TAG_NAME="${{ github.event.workflow_run.head_branch }}"
          IFS='/' read -r _ PKG_NAME TAG_VERSION <<< "$TAG_NAME"
          VERSION=${TAG_VERSION#v}

          # Check if this is a prerelease (contains -, a, b, rc, etc.)
          if [[ "$VERSION" =~ [a-zA-Z-] ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          echo "PACKAGE_NAME=${PKG_NAME}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "PRERELEASE=${PRERELEASE}" >> $GITHUB_ENV
          echo "Parsed Package: $PKG_NAME, Version: $VERSION, Prerelease: $PRERELEASE"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Bump Version
        run: |
          cd packages/${{ env.PACKAGE_NAME }}
          uv version ${{ env.VERSION }}

      - name: Build Package
        run: |
          cd packages/${{ env.PACKAGE_NAME }}
          uv build

      - name: Publish to PyPI
        run: |
          cd packages/${{ env.PACKAGE_NAME }}
          uv publish --trusted-publishing always

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git restore packages/${{ env.PACKAGE_NAME }}/pyproject.toml

          git fetch origin main
          git checkout main

          cd packages/${{ env.PACKAGE_NAME }}
          uv version ${{ env.VERSION }}

          cd ../../

          # Generate changelog for this specific package using git-cliff
          # Use --include-path to only include commits that touched this package's directory
          uvx git-cliff --include-path "packages/${{ env.PACKAGE_NAME }}/**" --tag "v${{ env.VERSION }}" --prepend packages/${{ env.PACKAGE_NAME }}/CHANGELOG.md --unreleased --repository "https://github.com/${{ github.repository }}"

          # Generate release notes for GitHub Release
          uvx git-cliff --include-path "packages/${{ env.PACKAGE_NAME }}/**" --tag "v${{ env.VERSION }}" --unreleased --strip all --repository "https://github.com/${{ github.repository }}" > release_notes.md

          git add packages/${{ env.PACKAGE_NAME }}/pyproject.toml packages/${{ env.PACKAGE_NAME }}/CHANGELOG.md
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): bump ${{ env.PACKAGE_NAME }} version to ${{ env.VERSION }} and update changelog"
            git push origin main
          else
            echo "No changes to commit."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          name: ${{ env.PACKAGE_NAME }} v${{ env.VERSION }}
          prerelease: ${{ env.PRERELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
