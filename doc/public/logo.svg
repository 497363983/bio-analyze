<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- DNA Helix Structure stylized as data points -->
  <path d="M40,160 Q70,100 100,100 T160,40" fill="none" stroke="url(#grad1)" stroke-width="12" stroke-linecap="round" />
  <path d="M40,40 Q70,100 100,100 T160,160" fill="none" stroke="#CBD5E1" stroke-width="12" stroke-linecap="round" opacity="0.5" />

  <!-- Data nodes/dots on the helix -->
  <circle cx="40" cy="160" r="8" fill="#10B981" />
  <circle cx="70" cy="130" r="8" fill="#3B82F6" />
  <circle cx="100" cy="100" r="8" fill="#10B981" />
  <circle cx="130" cy="70" r="8" fill="#3B82F6" />
  <circle cx="160" cy="40" r="8" fill="#10B981" />

  <!-- Abstract container shape (Toolbox metaphor) -->
  <rect x="20" y="20" width="160" height="160" rx="20" fill="none" stroke="#1E293B" stroke-width="4" opacity="0.1" />
</svg>
